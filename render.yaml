services:
  # FastAPI Backend (Python ML Service)
  - type: web
    name: livestock-backend
    runtime: python
    plan: free
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 7860
    healthCheckPath: /health
    autoDeploy: true

  # Next.js Frontend
  - type: web
    name: livestock-frontend
    runtime: node
    plan: free
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma migrate deploy
      npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: livestock-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MODEL_API_URL
        sync: false
      - key: BACKEND_API_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: livestock-db
    databaseName: livestock_platform
    user: livestock_user
    plan: free
